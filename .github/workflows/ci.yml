name: CI
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # The wire_format snapshot test is the protocol drift guard: it fails on
      # any change to the serialized shape unless the snapshot (and the
      # protocol version) were deliberately regenerated.
      - run: cargo test
      - run: cargo fmt --check
        continue-on-error: true

  # Publish to crates.io on version tags. The tag must match the crate
  # version (cargo publish fails otherwise). Needs the CARGO_REGISTRY_TOKEN
  # repository secret (a crates.io API token).
  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify the tag matches the crate version
        run: |
          crate_version=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          [ "v$crate_version" = "$GITHUB_REF_NAME" ] || {
            echo "Tag $GITHUB_REF_NAME != crate version $crate_version"; exit 1; }
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
